<svg xmlns="http://www.w3.org/2000/svg" width="248" height="72" viewBox="0 0 248 72" role="img" aria-label="Audited with Claude Fable 5">
  <title>Audited with Claude Fable 5</title>
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2140"/>
      <stop offset="1" stop-color="#1b1530"/>
    </linearGradient>
    <linearGradient id="fspark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b98bff"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </linearGradient>
  </defs>

  <rect x="0.5" y="0.5" width="247" height="71" rx="12" fill="url(#fbg)" stroke="#8A2BE2" stroke-opacity="0.55"/>

  <!-- original 5-ray spark emblem: five tapered rays from a centre, over an open-book baseline -->
  <g transform="translate(38 36)">
    <g fill="url(#fspark)">
      <path d="M0 -21 L3.2 -4 L0 0 L-3.2 -4 Z"/>
      <path d="M20 -6.5 L4.4 -1.3 L0 0 L4 -4.6 Z"/>
      <path d="M12.4 17 L2.7 3.3 L0 0 L5.1 1.4 Z"/>
      <path d="M-12.4 17 L-2.7 3.3 L0 0 L-5.1 1.4 Z"/>
      <path d="M-20 -6.5 L-4.4 -1.3 L0 0 L-4 -4.6 Z"/>
    </g>
    <circle r="2.6" fill="#f3ecff"/>
    <!-- open-book baseline: the "Fable" nod -->
    <path d="M-15 20 Q0 14 15 20 M0 16 L0 21" fill="none" stroke="#b98bff" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.85"/>
  </g>

  <text x="74" y="31" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#f3ecff" letter-spacing="0.5">Claude Fable 5</text>
  <text x="74" y="50" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="600" fill="#b98bff" letter-spacing="2.4">AUDITED</text>
  <rect x="74" y="55.5" width="150" height="2" rx="1" fill="#8A2BE2" fill-opacity="0.5"/>
</svg>
