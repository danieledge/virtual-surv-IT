name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor of the supported range (pyproject requires-python >= 3.10)
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          # Windows leg: the guards + launcher have Windows-specific paths (py launcher,
          # backslash separators); several past regressions were Windows-only.
          - os: windows-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -r requirements-dev.txt
      - run: pytest
      - name: Validate masking (safety + detection fidelity)
        run: python -m scripts.validate_masking
      - name: Validate plugin manifest (declared agents/skills resolve)
        run: python -m scripts.validate_manifest

  lint:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install analysers
        # Pinned so a new analyser release can't red an untouched repo (ruff format is version-sensitive).
        run: pip install "ruff==0.15.20" "bandit>=1.7,<2"
      - name: ruff (lint)
        run: ruff check scripts/ .claude/hooks/ rules/ tests/
      - name: ruff (format check)
        run: ruff format --check scripts/ .claude/hooks/ rules/ tests/
      - name: bandit (security)
        run: bandit -r scripts/ .claude/hooks/ -q
      - name: shellcheck (Bash)
        run: shellcheck scripts/*.sh scripts/git-hooks/pre-commit scripts/git-hooks/pre-push .claude/hooks/run-guard.sh

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  no-raw-data:
    name: No raw data committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if raw data files are present (CLAUDE.md §5)
        run: |
          # Cover the pipeline's own formats too: .jsonl is the ingest/masking format and
          # .xlsx/.xls/.tsv are first-class converter inputs, not just csv/parquet/pcap.
          if git ls-files '*.csv' '*.tsv' '*.parquet' '*.pcap' '*.jsonl' '*.xlsx' '*.xls' | grep -q .; then
            echo "::error::Raw data files committed. Use synthetic data only (CLAUDE.md §5)."
            git ls-files '*.csv' '*.tsv' '*.parquet' '*.pcap' '*.jsonl' '*.xlsx' '*.xls'
            exit 1
          fi
          echo "OK - no raw data files tracked."
