# Regulatory register - the single source of truth for pinpoint legal citations (ADR-001).
#
# WHY: an LLM emits citations ("MAR Article 12", "Rule 10b-5") from parametric memory, where it
# confabulates confidently. In a regulated domain a wrong pinpoint citation is a control failure.
# So `scripts/check_citations.py` flags any pinpoint citation in an artifact that is not listed here.
#
# THIS IS A VERIFICATION LEDGER, NOT AN ALLOWLIST. It does NOT limit what the team may cite - the
# agents should use their full regulatory knowledge to surface the obligation that applies. A
# citation not in this list is "not yet human-verified" (flag it to-verify, confirm against the
# source, then ADD it), NOT "wrong" or "forbidden". The list starts small on purpose and grows as
# obligations are verified - so DON'T treat its size as a cap on the team's regulatory coverage.
#
# SEED DATA: the entries below are the obligations this reference repo cites (spoofing rule +
# comms surveillance). Each pinpoint + typology was checked against the primary source on
# 2026-06-29 (see `verified_on` / `source`) and marked `status: verified`. For PRODUCTION use,
# replace/extend with YOUR firm's in-scope obligations and re-verify against the primary source
# for your jurisdiction; treat any `status: example` entry as un-confirmed until a human checks it.
#
# Each entry:
#   id            stable key
#   regime        the instrument/framework (e.g. "EU MAR")
#   jurisdiction  EU | UK | US | ...
#   typology      the surveillance scenario(s) it supports (free text / keywords)
#   pinpoint      the exact citation string detection compares against (article/section/rule)
#   aliases       other spellings the same obligation may appear as (optional)
#   effective_date  when it took/takes effect (ISO date or "-")
#   source        primary-source URL or document id
#   verified_on   date a human last checked it against the source ("-" = not yet)
#   status        verified | example

# FCA HANDBOOK ENTRIES (explored 2026-07-21): the Handbook has stable per-rule permalinks
# (https://www.handbook.fca.org.uk/handbook/<SOURCEBOOK>/<chapter>/<section>.html, e.g.
# SYSC/6/1.html) and a point-in-time "Timeline" - use the permalink as `source` and verify
# against the live page. NOTE: no public API/machine-readable export was found, pages are
# JS-rendered (bulk scraping unreliable), and the footer asserts "All rights reserved" - so
# this register stores ONLY pinpoints + our own typology mapping + the URL, never Handbook
# text. Review the FCA's terms before any future bulk-text ingestion.

# PERMALINK SCHEMES BY REGIME (construct the source link from the pinpoint, then a human
# verifies per the three checks below - links only, no rule text stored, all regimes):
#   EUR-Lex (EU regs/directives - MAR, MiFID II, CDRs, MiCA):
#     https://eur-lex.europa.eu/eli/reg/<year>/<number>/oj  (per-article anchors exist on
#     consolidated versions; EU legal texts carry an open reuse policy).
#   legislation.gov.uk (UK SIs/acts - e.g. MLRs 2017):
#     https://www.legislation.gov.uk/uksi/<year>/<no>/regulation/<n>  (per-provision URLs;
#     Open Government Licence - the friendliest reuse terms of the lot).
#   eCFR (US CFR incl. SEC rules - e.g. 17 CFR 240.10b-5, 240.17a-4):
#     https://www.ecfr.gov/current/title-17/section-240.<rule>  (US federal materials are
#     public domain).
#   FINRA rulebook: https://www.finra.org/rules-guidance/rulebooks/finra-rules/<number>
#   FCA Handbook: https://www.handbook.fca.org.uk/handbook/<BOOK>/<ch>/<sec>.html
#     (JS-rendered site, all-rights-reserved footer - links only; see note above).
#   MAS / Singapore:
#     Statutes (e.g. Securities and Futures Act 2001 Part 12 market conduct):
#       https://sso.agc.gov.sg/Act/SFA2001  (Singapore Statutes Online; per-provision
#       navigation - cite section in the pinpoint, e.g. "SFA s.197").
#     MAS Notices/Guidelines (e.g. Notice 626 AML/CFT):
#       https://www.mas.gov.sg/regulation/notices/notice-626  (per-notice pages, usually
#       with a PDF - link the notice page; cite paragraph in the pinpoint).
#   FATF / ESMA guidance: link the official publication page (PDF documents); cite the
#     recommendation/paragraph in the pinpoint.
#
# HOW A HUMAN VERIFIES AN ENTRY (the three checks - all of them, not just the click):
#   1. EXISTS   - the linked page shows the cited provision itself (rule number visible,
#                 not a neighbour, not "[deleted]").
#   2. SUPPORTS - read the rule text and confirm it says what the ARTIFACT claims it says
#                 (a citation can exist and still be wrong for the sentence it's attached
#                 to - that mismatch is the confabulation this register exists to catch).
#   3. MAPS     - the entry's typology keywords are right (future engagements retrieve by
#                 typology).
# Then set verified_on to today and status: verified, and commit through normal review.
# In plugin mode, record it in the WORKING PROJECT's own config/regulatory-register.yaml
# (an overlay check_citations merges over this bundled file - entries extend, same id
# overrides). A minute or two per obligation, once per obligation - not per engagement.

