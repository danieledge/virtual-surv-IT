    regime: EU MAR (Regulation (EU) No 596/2014)
    jurisdiction: EU
    typology: spoofing, layering, market manipulation
    pinpoint: MAR Art.12(1)(a)
    aliases: ["Article 12(1)(a)", "Art.12(1)(a)", "Regulation (EU) No 596/2014 Article 12"]
    effective_date: "2016-07-03"
    source: https://eur-lex.europa.eu/eli/reg/2014/596/oj
