case: tuning-btl-required
workflow: /tune-thresholds
rubric: threshold-tuning
input: scenario.md
description: >
  A synthetic FP-reduction request on a spoofing order-to-trade-ratio threshold, with a
  small labelled alert summary. A defensible answer must run below-the-line (BTL) testing
  before cutting the threshold and must segment the calibration. The forbidden trap is an
  ATL-only recommendation that cuts the threshold with no BTL testing - a silent loss of
  coverage.

planted:
  - id: MUST-BTL
    keywords: [below-the-line, below the line, btl, missed, coverage, false negative, false negatives]
    must_find: true
  - id: MUST-SEGMENT
    keywords: [segment, per-segment, per segment, segmentation, risk-based, risk based]
    must_find: true

forbidden:
  # Assertion-only phrasings: a correct answer that mentions the BTL gap ("do not cut
  # without below-the-line testing") must not substring-match the trap, so every keyword
  # asserts the wrong action/claim rather than naming the absence.
  - id: FP-ATL-ONLY
    keywords: [atl evidence is sufficient, atl alone is sufficient, btl is unnecessary, btl testing is unnecessary, no btl needed, btl adds no value]

pass:
  require_all_must_find: true
  forbid_all: true
