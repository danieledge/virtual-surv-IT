# Local guardrails enforcing CLAUDE.md §5 (no secrets / no raw data in the repo).
# Install once:  pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=512"]
      # vendor/ is third-party code shipped verbatim (vendor/README.md) - auto-fixing its
      # whitespace would modify it, breaking the clean-diff-against-upstream rule.
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: trailing-whitespace
        exclude: ^vendor/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: block-raw-data
        name: block raw market/comms data files (use synthetic data - CLAUDE.md §5)
        entry: "Raw data files must not be committed. Generate synthetic data with scripts/gen_synthetic.py."
        language: fail
        # Match CI's no-raw-data gate: include the pipeline's own .jsonl and the converter's .xlsx/.xls/.tsv.
        files: '\.(csv|tsv|parquet|pcap|jsonl|xlsx|xls)$'

      # Definition-of-Done gate: tests must pass before a commit lands (automatic, not
      # prompt-dependent). Runs on changes to rules/, tests/ or scripts/.
      - id: pytest
        name: run tests (Definition of Done)
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        files: '^(rules|tests|scripts)/.*\.py$'
